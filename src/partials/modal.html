<div id="ctaModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300" style="background: rgba(6, 10, 20, 0.85); backdrop-filter: blur(8px);">
    <div class="glass-card rounded-2xl max-w-md w-full p-7 relative shadow-2xl transform scale-95 transition-transform duration-300" id="modalContainer" style="border: 1px solid rgba(232,77,26,0.15);">
        <!-- Close Button -->
        <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl p-1 cursor-pointer transition-colors">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <!-- Modal Header -->
        <div class="mb-6">
            <h3 class="text-xl font-black text-white mb-2" id="modalTitle">Залишити заявку</h3>
            <p class="text-xs text-gray-400 leading-relaxed">Вкажіть ваші контакти, і майстер зателефонує вам протягом 10 хвилин для консультації.</p>
        </div>

        <!-- Form -->
        <form onsubmit="handleFormSubmit(event)" class="space-y-4">
            <input type="hidden" id="serviceSubject" value="Загальна заявка">
            <div>
                <label class="block text-xs font-semibold text-gray-300 mb-1.5">Ваше ім'я</label>
                <input type="text" required placeholder="Олександр" class="w-full px-4 py-3 rounded-xl text-white text-sm transition-all duration-300 focus:outline-none" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-300 mb-1.5">Номер телефону</label>
                <input type="tel" required placeholder="+380" class="w-full px-4 py-3 rounded-xl text-white text-sm transition-all duration-300 focus:outline-none" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-300 mb-1.5">Що потрібно відремонтувати? (опціонально)</label>
                <textarea rows="2" placeholder="Наприклад: Ноутбук Asus гріється, або заміна екрану Xiaomi" class="w-full px-4 py-3 rounded-xl text-white text-sm transition-all duration-300 focus:outline-none resize-none" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'"></textarea>
            </div>

            <button type="submit" class="btn-primary w-full cursor-pointer text-sm mt-2">
                <i class="fa-solid fa-paper-plane mr-2"></i> Надіслати майстру
            </button>
        </form>
    </div>
</div>
